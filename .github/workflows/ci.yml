name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    name: build · typecheck · test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Install
        run: npm install
      - name: Build
        run: npm run build
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
